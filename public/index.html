<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Task Manager</title>
    <script>
        const listDisplayUrl = new URL('./list-display/', window.location.href);
        listDisplayUrl.search = window.location.search;
        listDisplayUrl.hash = window.location.hash;
        window.location.replace(listDisplayUrl.toString());
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117; color: #c9d1d9;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .hub { max-width: 640px; width: 100%; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 8px; color: #e6edf3; }
        .subtitle { color: #8b949e; margin-bottom: 40px; font-size: 1rem; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .nav-card { display: block; padding: 24px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; text-decoration: none; color: #c9d1d9; transition: border-color 0.2s ease, transform 0.2s ease; }
        .nav-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
        .nav-card .icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .nav-card .label { font-size: 1rem; font-weight: 600; color: #e6edf3; display: block; }
        .nav-card .desc { font-size: 0.8rem; color: #8b949e; margin-top: 4px; display: block; }
        .redirect-note { font-size: 0.85rem; color: #8b949e; }
        .redirect-note a { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="hub">
        <h1>&#128203; GitHub Task Manager</h1>
        <p class="subtitle">Collaborative Task Management &#8212; Connected to GitHub Repository</p>
        <nav class="nav-grid" aria-label="Site navigation">
            <a href="./list-display/" class="nav-card">
                <span class="icon">&#128203;</span>
                <span class="label">Task Manager</span>
                <span class="desc">Create, edit and track tasks in list &amp; timeline views</span>
            </a>
            <a href="./graph-display/" class="nav-card">
                <span class="icon">&#128376;&#65039;</span>
                <span class="label">Graph View</span>
                <span class="desc">Interactive force-directed dependency graph</span>
            </a>
            <a href="./health/" class="nav-card">
                <span class="icon">&#10003;</span>
                <span class="label">Health Check</span>
                <span class="desc">Deployment status and environment info</span>
            </a>
        </nav>
        <p class="redirect-note">Redirecting to <a href="./list-display/">Task Manager</a>&#8230;</p>
    </div>
</body>
</html>
